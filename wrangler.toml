name = "mimo-proxy-cf-worker"
main = "src/index.ts"
compatibility_date = "2026-06-18"
workers_dev = true

[vars]
MIMO_BASE_URL = "https://api.xiaomimimo.com"

# JWT 缓存可选：本地开发使用 preview_id；生产部署前请把 id 替换为真实 KV namespace id。
[[kv_namespaces]]
binding = "MIMO_JWT_KV"
id = "00000000000000000000000000000000"
preview_id = "mimo_proxy_jwt_preview"

[env.production]
workers_dev = false
